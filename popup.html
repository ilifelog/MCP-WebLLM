<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Multi Bridge</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1 class="logo">MCP Multi Bridge</h1>
      <span class="version">v1.0.0</span>
    </header>

    <!-- Add server form -->
    <section class="add-section">
      <h2 class="section-title">Add MCP Server</h2>
      <form id="addForm" autocomplete="off">
        <div class="form-row">
          <label for="serverName">Name</label>
          <input type="text" id="serverName" placeholder="My MCP Server" required />
        </div>
        <div class="form-row">
          <label for="serverUrl">URL</label>
          <input type="url" id="serverUrl" placeholder="http://localhost:3006/sse" required />
        </div>
        <div class="form-row">
          <label for="serverTransport">Transport</label>
          <select id="serverTransport">
            <option value="sse">SSE</option>
            <option value="streamable-http">Streamable HTTP</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Add Server</button>
      </form>
    </section>

    <hr class="divider" />

    <!-- Server list -->
    <section class="servers-section">
      <h2 class="section-title">
        Servers
        <button class="btn btn-sm" id="refreshBtn" title="Refresh">Refresh</button>
      </h2>
      <div id="serverList" class="server-list">
        <p class="empty">No servers configured yet.</p>
      </div>
    </section>

    <footer class="footer">
      <span>Supports: ChatGPT, Gemini, DeepSeek, Grok, Perplexity, etc.</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
